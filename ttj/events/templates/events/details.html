<h1>{{ event.name }}</h1>

<h2>Activities</h2>
<ul>
    {% for a in event.activities.all %}
    <li>{{ a }}</li>
    {% endfor %}
</ul>

<h2>Participants</h2>
<ul>
{% for user in event.participants.all %}
    <li>
        {% if user.get_full_name == "" %}
            @{{ user.username }}
        {% else %}
            {{ user.get_full_name }}
        {% endif %}
    </li>
{% endfor %}
</ul>
